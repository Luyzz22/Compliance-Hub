# Ground Truth for Hybrid Retrieval Evaluation
#
# Curated synthetic queries mapped to expected corpus documents.
# NO raw customer prompts — only category-based representative queries.
# Maintained manually by compliance domain experts.
#
# Format per entry:
#   query_id:    Unique identifier
#   category:    Thematic category for reporting
#   query:       Synthetic representative query (German)
#   expected_doc_ids: List of doc_ids that SHOULD appear in top-k
#   good_doc_ids:     Subset considered "highly relevant"
#   bad_doc_ids:      Documents that should NOT rank highly (negative examples)
#   notes:       Optional context for evaluators

queries:
  - query_id: "eval-001"
    category: "hochrisiko_definition"
    query: "Was sind Hochrisiko-KI-Systeme nach dem EU AI Act?"
    expected_doc_ids:
      - "euaia-art6"
      - "euaia-annexiii"
      - "euaia-art7"
    good_doc_ids:
      - "euaia-art6"
      - "euaia-annexiii"
    bad_doc_ids:
