name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e '.[dev,api]' rank-bm25

      - name: Lint
        run: |
          ruff check app/ tests/
          ruff format --check app/ tests/

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: v0.70.0

      - name: OPA Rego policy tests
        run: opa test infra/opa/policies/compliancehub/regos/

      - name: Test
        run: python -m pytest tests/ -q
        # DB governance: tests/test_db_schema_alignment.py (ORM vs DB) +
        # tests/test_db_migrations_kritis_sector.py (legacy upgrade). Deploy: migrate_all or API lifespan.
